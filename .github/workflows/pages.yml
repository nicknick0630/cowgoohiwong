name: Build and Deploy (Tailwind + GitHub Pages)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tailwind CLI (standalone v3)
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.1/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 tailwindcss

      - name: Build Tailwind CSS
        run: |
          mkdir -p assets/css
          ./tailwindcss -c tailwind.config.js -i ./assets/css/input.css -o ./assets/css/site.css --minify

      - name: Prepare dist
        run: |
          mkdir -p dist
          shopt -s dotglob
          cp -r index.html privacy terms assets CNAME robots.txt sitemap.xml llms.txt dist
          # Fail fast if any critical SEO file is missing
          for f in dist/index.html dist/robots.txt dist/sitemap.xml dist/llms.txt dist/assets/og-image.png dist/assets/css/site.css dist/assets/AppIcon-128.png dist/assets/favicon-32.png dist/assets/apple-touch-icon-180.png; do
            test -f "$f" || { echo "Missing critical file: $f" && exit 1; }
          done
          ls -la dist/

      - name: Stamp lastmod / dateModified to today
        run: |
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          echo "Stamping date: $TODAY"
          # sitemap.xml: all <lastmod>YYYY-MM-DD</lastmod>
          sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>${TODAY}</lastmod>|g" dist/sitemap.xml
          # index.html JSON-LD: "dateModified": "YYYY-MM-DD"
          sed -i "s|\"dateModified\": \"[0-9-]*\"|\"dateModified\": \"${TODAY}\"|g" dist/index.html
          # llms.txt: 「最後更新：YYYY-MM-DD」
          sed -i "s|最後更新：[0-9-]*|最後更新：${TODAY}|g" dist/llms.txt
          echo "--- Stamped values ---"
          grep -E "lastmod|dateModified|最後更新" dist/sitemap.xml dist/index.html dist/llms.txt | head -10

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4